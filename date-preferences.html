<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Date Preferences | SecretDate ❤️</title>
<link rel="stylesheet" href="css/style.css" />
<style>
body {
  background: #ffe6ea;
  font-family: "Segoe UI", sans-serif;
  text-align: center;
  color: #333;
}
form {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  margin: 40px auto;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
}
.btn {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  font-weight: bold;
  border-radius: 6px;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>Date Preferences ❤️</h1>
<form id="preferencesForm">
  <label>Interested In:</label>
  <select required>
    <option value="">Select</option>
    <option>Boy</option>
    <option>Girl</option>
    <option>Any</option>
  </select>

  <label>Type of Date:</label>
  <select required>
    <option value="">Select</option>
    <option>Coffee Date</option>
    <option>Dinner Date</option>
    <option>Walk</option>
    <option>Surprise Date</option>
  </select>

  <label>Preferred Date:</label>
  <input type="date" required />

  <label>Preferred Time:</label>
  <input type="time" required />

  <label>Short Message:</label>
  <textarea placeholder="Describe what kind of date you’d like" rows="3" required></textarea>

  <button type="submit" class="btn">Submit Preferences</button>
</form>

<script>
document.getElementById('preferencesForm').addEventListener('submit', function(e){
  e.preventDefault();
  alert('Thank you! We will match you with someone available at the same time. If a match is found, we will send you a WhatsApp payment link 1 hour before the date.');
  window.location.href = 'index.html';
});
</script>

</body>
</html>
