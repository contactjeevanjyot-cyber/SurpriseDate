<script>
const form = document.getElementById('preferencesForm');
const previewImage = document.getElementById('previewImage');

// Show photo preview
document.getElementById('photo').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(ev){
      previewImage.src = ev.target.result;
      previewImage.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

// Form submission with WhatsApp Auto-Open
form.addEventListener('submit', async function(e){
  e.preventDefault();

  const photoFile = document.getElementById('photo').files[0];
  let photoURL = '';
  
  if (photoFile) {
    const reader = new FileReader();
    reader.onload = async function(ev) {
      photoURL = ev.target.result;
      await submitToBackend(photoURL);
    };
    reader.readAsDataURL(photoFile);
  } else {
    await submitToBackend('');
  }
});

async function submitToBackend(photoURL) {
  const registrationData = JSON.parse(localStorage.getItem('registrationData') || '{}');
  
  const data = {
    name: registrationData.name || 'User',
    mobile: registrationData.mobile || '',
    contactChoice: document.getElementById('contactChoice').value,
    photoURL: photoURL,
    date: document.getElementById('date').value,
    time: document.getElementById('time').value,
    message: document.querySelector('textarea').value,
    interestedIn: document.querySelectorAll('select')[1].value,
    dateType: document.querySelectorAll('select')[2].value
  };

  console.log('Sending to backend:', data); // For testing

  try {
    const response = await fetch('/.netlify/functions/saveData', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    console.log('Backend response:', result); // For testing
    
    if (result.status === 'success') {
      localStorage.setItem('dateData', JSON.stringify(data));
      
      if (result.matched) {
        // 🎉 MATCH FOUND - Auto-open WhatsApp
        const message = `🎉 AMAZING! Your SecretDate match is confirmed!

📅 Date: ${data.date}
⏰ Time: ${data.time}
👤 Your Match: ${result.matchData.name}

💳 Complete payment: [rzp.io](https://rzp.io/rzp/B1sDY6e)

Looking forward to your surprise date! ❤️`;
        
        // Open WhatsApp Web with pre-filled message
        window.open(`[wa.me](https://wa.me/91${data.mobile}?text=${encodeURIComponent(message)})`);
        
        alert(`🎉 MATCH FOUND! You've been matched with ${result.matchData.name}! WhatsApp will open automatically.`);
      } else {
        alert('🎉 Thank you! We\'ll notify you via WhatsApp when a match is found.');
      }
      
      window.location.href = 'confirmation.html';
    } else {
      alert('Error: ' + result.error);
    }
  } catch (err) {
    alert('Network error: ' + err.message);
    console.error('Submit error:', err);
  }
}
</script>
