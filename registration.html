<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | SecretDate ❤️</title>

<style>
body {
  background: #ffe6ea;
  font-family: "Segoe UI", sans-serif;
  text-align: center;
  color: #333;
  margin: 0;
}

.container {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  margin: 40px auto;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid #ccc;
  border-radius: 6px;
}

.btn {
  background: #ff4d6d;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  font-weight: bold;
  border-radius: 6px;
  margin-top: 10px;
  cursor: pointer;
}

.switch {
  margin-top: 15px;
  font-size: 14px;
  color: #555;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>SecretDate ❤️</h1>
<p>Your next date is a secret… until you meet.</p>

<div class="container">

  <!-- REGISTER FORM -->
  <form id="registerForm">
    <h2>Register</h2>

    <input type="text" id="name" placeholder="Full Name" required>

    <select id="gender" required>
      <option value="">Select Gender</option>
      <option>Male</option>
      <option>Female</option>
      <option>Lesbian</option>
      <option>Gay</option>
      <option>Bisexual</option>
      <option>Transgender</option>
    </select>

    <input type="number" id="age" placeholder="Age (18+)" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="tel" id="mobile" placeholder="Mobile Number" required>
    <input type="text" id="city" value="Ahmedabad" required>

    <label>
      <input type="checkbox" id="agree" required>
      I agree to Privacy Policy
    </label>

    <button type="submit" class="btn">Register</button>
  </form>

  <!-- LOGIN FORM -->
  <form id="loginForm" style="display:none;">
    <h2>Login</h2>

    <input type="text" id="loginMobile" placeholder="Enter Mobile Number" required>

    <button type="submit" class="btn">Login</button>
  </form>

  <p class="switch" onclick="toggleForm()">Already have an account? Login</p>

</div>

<script>

// 🔄 Toggle Register/Login
function toggleForm() {
  const reg = document.getElementById('registerForm');
  const log = document.getElementById('loginForm');

  if (reg.style.display === "none") {
    reg.style.display = "block";
    log.style.display = "none";
  } else {
    reg.style.display = "none";
    log.style.display = "block";
  }
}

// 📝 REGISTER
document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();

  const age = parseInt(document.getElementById('age').value);

  if (age < 18) {
    alert("🚫 You must be 18+");
    return;
  }

  if (!document.getElementById('agree').checked) {
    alert("Please accept terms");
    return;
  }

  const user = {
    name: document.getElementById('name').value,
    gender: document.getElementById('gender').value,
    age: age,
    email: document.getElementById('email').value,
    mobile: document.getElementById('mobile').value,
    city: document.getElementById('city').value
  };

  // Save user
  localStorage.setItem('user', JSON.stringify(user));

  alert("✅ Registered Successfully!");

  window.location.href = "date-preferences.html";
});

// 🔐 LOGIN
document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();

  const mobile = document.getElementById('loginMobile').value;
  const savedUser = JSON.parse(localStorage.getItem('user'));

  if (!savedUser) {
    alert("No account found. Please register.");
    return;
  }

  if (savedUser.mobile === mobile) {
    alert("✅ Login successful!");
    window.location.href = "date-preferences.html";
  } else {
    alert("❌ Wrong mobile number");
  }
});

</script>

</body>
</html>
